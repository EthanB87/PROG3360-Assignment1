apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: assignment3
  labels:
    app: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
      - name: product-service
        image: product-service:latest  # Replace with your built image
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: app-config
